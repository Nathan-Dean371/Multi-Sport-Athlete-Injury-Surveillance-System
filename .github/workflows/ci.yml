# ============================================================================
# Multi-Sport Athlete Injury Surveillance System
# CI/CD Pipeline - Build, Test, and Deploy
# ============================================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

env:
  AWS_REGION: eu-west-1 # Changed to Ireland region
  ECR_REPOSITORY: injury-surveillance-backend

jobs:
  # --------------------------------------------------------------------------
  # Job 1: Test Backend
  # --------------------------------------------------------------------------
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: identity_service_test
          POSTGRES_USER: identity_admin
          POSTGRES_PASSWORD: test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5.25-community
        env:
          NEO4J_AUTH: neo4j/test-password
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p test-password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Prepare migration directories
        run: |
          mkdir -p ./database/postgres/migrations
          mkdir -p ./database/neo4j/migrations

      - name: Run Flyway validate
        run: |
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/database/postgres/migrations:/flyway/sql:ro" \
            flyway/flyway:10.17.1 \
            -url=jdbc:postgresql://localhost:5432/identity_service_test \
            -user=identity_admin \
            -password=test-password \
            -connectRetries=60 \
            -locations=filesystem:/flyway/sql \
            -ignoreMigrationPatterns='*:pending' \
            validate

      - name: Run Flyway migrate
        run: |
          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/database/postgres/migrations:/flyway/sql:ro" \
            flyway/flyway:10.17.1 \
            -url=jdbc:postgresql://localhost:5432/identity_service_test \
            -user=identity_admin \
            -password=test-password \
            -connectRetries=60 \
            -locations=filesystem:/flyway/sql \
            migrate

      - name: Run neo4j-migrations apply
        run: |
          docker build \
            -t injury-surveillance-neo4j-migrations-runner:3.3.1 \
            ./tools/neo4j-migrations-runner

          docker run --rm --network host \
            -v "$GITHUB_WORKSPACE/database/neo4j/migrations:/migrations:ro" \
            injury-surveillance-neo4j-migrations-runner:3.3.1 \
            --address neo4j://localhost:7687 \
            --username neo4j \
            --password=test-password \
            --location file:///migrations \
            apply

      - name: Run linter
        working-directory: ./backend
        run: npm run lint

      - name: Run unit tests
        working-directory: ./backend
        run: npm run test:cov
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: identity_service_test
          POSTGRES_USER: identity_admin
          POSTGRES_PASSWORD: test-password
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: test-password
          JWT_SECRET: test-jwt-secret

      - name: Run E2E tests
        working-directory: ./backend
        run: npm run test:e2e
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: identity_service_test
          POSTGRES_USER: identity_admin
          POSTGRES_PASSWORD: test-password
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: test-password
          JWT_SECRET: test-jwt-secret

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          directory: ./backend/coverage
          flags: backend
          fail_ci_if_error: false

  # --------------------------------------------------------------------------
  # Job 1b: Test Admin Dashboard
  # --------------------------------------------------------------------------
  test-admin-dashboard:
    name: Test Admin Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/admin-dashboard/package-lock.json
      - name: Install dependencies
        working-directory: ./web/admin-dashboard
        run: npm ci
      - name: Run linter
        working-directory: ./web/admin-dashboard
        run: npm run lint
      - name: Build test
        working-directory: ./web/admin-dashboard
        run: npm run build

  # --------------------------------------------------------------------------
  # Job 2: Build and Push Docker Image
  # --------------------------------------------------------------------------
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    # Run on push to main or manual trigger
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    outputs:
      image-uri: ${{ steps.image-uri.outputs.uri }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"

      - name: Set image URI output
        id: image-uri
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:main" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # Job 2b: Build and Push Admin Docker Image
  # --------------------------------------------------------------------------
  build-and-push-admin:
    name: Build and Push Admin Docker Image
    runs-on: ubuntu-latest
    needs: test-backend
    # Run on push to main or manual trigger
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    env:
      ECR_REPOSITORY: injury-surveillance-admin

    outputs:
      image-uri: ${{ steps.image-uri.outputs.uri }}
      ecr-registry: ${{ steps.login-ecr.outputs.registry }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./web/admin-dashboard
          file: ./web/admin-dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.build.outputs.digest }}"

      - name: Set image URI output
        id: image-uri
        run: |
          echo "uri=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:main" >> $GITHUB_OUTPUT

  # --------------------------------------------------------------------------
  # Job 3: Deploy to EC2 (Optional - Manual Trigger)
  # --------------------------------------------------------------------------
  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [build-and-push, build-and-push-admin]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Checkout code (for migration SQL files)
        uses: actions/checkout@v4

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image-uri }}
          ADMIN_IMAGE_URI: ${{ needs.build-and-push-admin.outputs.image-uri }}
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr-registry }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          NEO4J_URI: ${{ secrets.NEO4J_URI }}
          NEO4J_USERNAME: ${{ secrets.NEO4J_USERNAME }}
          NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
        run: |
          # Save SSH key
          echo "$EC2_SSH_KEY" > ec2_key.pem
          chmod 600 ec2_key.pem

          # Copy migration directories to EC2
          ssh -T -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST "mkdir -p /tmp/injury-surveillance-migrations/postgres /tmp/injury-surveillance-migrations/neo4j /tmp/injury-surveillance-migrations/neo4j-migrations-runner /tmp/injury-surveillance-nginx"
          scp -r -i ec2_key.pem -o StrictHostKeyChecking=no \
            ./database/postgres/migrations/. \
            $EC2_USER@$EC2_HOST:/tmp/injury-surveillance-migrations/postgres/
          scp -r -i ec2_key.pem -o StrictHostKeyChecking=no \
            ./database/neo4j/migrations/. \
            $EC2_USER@$EC2_HOST:/tmp/injury-surveillance-migrations/neo4j/
          scp -r -i ec2_key.pem -o StrictHostKeyChecking=no \
            ./tools/neo4j-migrations-runner/. \
            $EC2_USER@$EC2_HOST:/tmp/injury-surveillance-migrations/neo4j-migrations-runner/

          # Copy NGINX reverse-proxy template to EC2 (install manually under /etc/nginx/)
          scp -i ec2_key.pem -o StrictHostKeyChecking=no \
            ./ops/nginx/injury-surveillance-reverse-proxy.conf \
            $EC2_USER@$EC2_HOST:/tmp/injury-surveillance-nginx/injury-surveillance-reverse-proxy.conf

          # SSH into EC2 and deploy
          ssh -T -i ec2_key.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << EOF
            set -euo pipefail

            # Login to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin $ECR_REGISTRY

            MIGRATIONS_DIR="/tmp/injury-surveillance-migrations"

            # PostgreSQL schema migration (Flyway)
            docker run --rm --network host \
              -v "\$MIGRATIONS_DIR/postgres:/flyway/sql:ro" \
              flyway/flyway:10.17.1 \
              -url=jdbc:postgresql://$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB \
              -user=$POSTGRES_USER \
              -password=$POSTGRES_PASSWORD \
              -connectRetries=60 \
              -baselineOnMigrate=true \
              -locations=filesystem:/flyway/sql \
              migrate

            # Neo4j schema migration (neo4j-migrations)
              docker build \
                -t injury-surveillance-neo4j-migrations-runner:3.3.1 \
                "\$MIGRATIONS_DIR/neo4j-migrations-runner"

              docker run --rm --network host \
                -v "\$MIGRATIONS_DIR/neo4j:/migrations:ro" \
                injury-surveillance-neo4j-migrations-runner:3.3.1 \
                --address "$NEO4J_URI" \
                --username "$NEO4J_USERNAME" \
                --password="$NEO4J_PASSWORD" \
                --location file:///migrations \
                apply

            rm -rf "\$MIGRATIONS_DIR"
            
            # Pull image
            docker pull $IMAGE_URI
            
            # Stop existing container
            docker stop injury-surveillance-backend || true
            docker rm injury-surveillance-backend || true
            
            # Run new container
            docker run -d \
              --name injury-surveillance-backend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              -e CORS_ORIGIN=${{ secrets.CORS_ORIGIN }} \
              -e PUBLIC_WEB_URL=${{ vars.PUBLIC_WEB_URL }} \
              -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
              -e POSTGRES_HOST=${{ secrets.POSTGRES_HOST }} \
              -e POSTGRES_PORT=${{ secrets.POSTGRES_PORT }} \
              -e POSTGRES_DB=${{ secrets.POSTGRES_DB }} \
              -e POSTGRES_USER=${{ secrets.POSTGRES_USER }} \
              -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
              -e NEO4J_URI=${{ secrets.NEO4J_URI }} \
              -e NEO4J_USERNAME=${{ secrets.NEO4J_USERNAME }} \
              -e NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }} \
              -e POSTGRES_SSL=${{ secrets.POSTGRES_SSL }} \
              $IMAGE_URI

            # Pull frontend image
            docker pull $ADMIN_IMAGE_URI

            # Stop existing frontend container
            docker stop injury-surveillance-admin || true
            docker rm injury-surveillance-admin || true

            # Run new frontend container
            docker run -d \
              --name injury-surveillance-admin \
              --restart unless-stopped \
              -p 3001:3000 \
              -e NODE_ENV=production \
              -e NEXT_PUBLIC_API_URL=http://localhost:3000 \
              $ADMIN_IMAGE_URI
            
            # Clean up old images
            docker image prune -f
          EOF

          # Clean up SSH key
          rm ec2_key.pem

  # --------------------------------------------------------------------------
  # Job 4: Smoke Test
  # --------------------------------------------------------------------------
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-to-ec2
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Wait for container to be ready
        run: sleep 15

      - name: Hit health endpoint
        run: |
          RESPONSE=$(curl -sf --retry 5 --retry-delay 5 --retry-connrefused \
            http://${{ secrets.EC2_HOST }}:3000/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":"ok"' || (echo "Health check failed" && exit 1)
