# ============================================================================
# Multi-Sport Athlete Injury Surveillance System
# Docker Compose for Intel/AMD64 Platforms
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Neo4j Graph Database (Development)
  # --------------------------------------------------------------------------
  neo4j:
    image: neo4j:5.25-community
    container_name: injury-surveillance-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/injury-surveillance-dev-password
      - NEO4J_PLUGINS=["apoc"]

      # Memory settings
      - NEO4J_server_memory_heap_initial__size=128m # was 256m
      - NEO4J_server_memory_heap_max__size=512m # was 1G
      - NEO4J_server_memory_pagecache_size=128m # was 256m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

    networks:
      - injury-surveillance-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # Neo4j Graph Database (Testing)
  # --------------------------------------------------------------------------
  neo4j-test:
    image: neo4j:5.25-community
    container_name: injury-surveillance-neo4j-test
    restart: unless-stopped
    ports:
      - "7475:7474" # Browser UI
      - "7688:7687" # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/injury-surveillance-test-password
      - NEO4J_PLUGINS=["apoc"]

      # Memory settings (lighter for testing)
      - NEO4J_server_memory_heap_initial__size=256m
      - NEO4J_server_memory_heap_max__size=512m
      - NEO4J_server_memory_pagecache_size=128m

    volumes:
      - neo4j-test-data:/data
      - neo4j-test-logs:/logs

    networks:
      - injury-surveillance-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: injury-surveillance-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=identity_service
      - POSTGRES_USER=identity_admin
      - POSTGRES_PASSWORD=identity-service-dev-password
      - PGDATA=/var/lib/postgresql/data/pgdata

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/postgres:/docker-entrypoint-initdb.d:ro

    networks:
      - injury-surveillance-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_admin -d identity_service"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # pgAdmin (Optional)
  # --------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: injury-surveillance-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=pgadmin-dev-password
      - PGADMIN_CONFIG_SERVER_MODE=False

    volumes:
      - pgadmin-data:/var/lib/pgadmin

    networks:
      - injury-surveillance-network

    depends_on:
      - postgres

  # --------------------------------------------------------------------------
  # NestJS Backend API (Development with Hot Reload)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder # Use builder stage which has dev dependencies
    container_name: injury-surveillance-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Application
      - NODE_ENV=development
      - PORT=3000

      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-your-development-jwt-secret-change-in-production}
      - JWT_EXPIRES_IN=1d

      # PostgreSQL (Identity Database)
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=identity_service
      - POSTGRES_USER=identity_admin
      - POSTGRES_PASSWORD=identity-service-dev-password

      # Neo4j (Graph Database)
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=injury-surveillance-dev-password

      # CORS
      - CORS_ORIGIN=http://localhost:3001,http://localhost:19006

    volumes:
      # Mount source code for hot reload
      - ./backend/src:/app/src:ro
      # Keep node_modules in container (don't mount from host)
      - backend-node-modules:/app/node_modules

    networks:
      - injury-surveillance-network

    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy

    # Start in dev mode with hot reload - healthchecks ensure DBs are ready
    command: npm run start:dev

volumes:
  neo4j-data:
    name: injury-surveillance-neo4j-data
  neo4j-logs:
    name: injury-surveillance-neo4j-logs
  neo4j-test-data:
    name: injury-surveillance-neo4j-test-data
  neo4j-test-logs:
    name: injury-surveillance-neo4j-test-logs
  postgres-data:
    name: injury-surveillance-postgres-data
  pgadmin-data:
    name: injury-surveillance-pgadmin-data
  backend-node-modules:
    name: injury-surveillance-backend-node-modules

networks:
  injury-surveillance-network:
    name: injury-surveillance-network
    driver: bridge
# ============================================================================
