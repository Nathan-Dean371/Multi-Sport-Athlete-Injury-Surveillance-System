# Reverse proxy for Multi-Sport Athlete Injury Surveillance System
#
# Routes:
#   api.yourdomain.com   -> http://127.0.0.1:3000
#   admin.yourdomain.com -> http://127.0.0.1:3001
#
# Notes:
# - Update the `server_name` values to match your real domain.
# - Start with HTTP (:80). After DNS is live, run Certbot (nginx plugin)
#   to automatically add the HTTPS (:443) blocks and certificates.

server {
    listen 80;
    listen [::]:80;

    server_name api.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Standard forwarded headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

server {
    listen 80;
    listen [::]:80;

    server_name admin.yourdomain.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # Standard forwarded headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
